name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"
      - "scripts/generate_metrics.py"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          METRICS_USER: garvit14
        run: python3 scripts/generate_metrics.py

      - name: Commit SVG if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg
          if git diff --cached --quiet; then
            echo "No changes to metrics.svg"
          else
            git commit -m "Update metrics.svg [skip ci]"
            git push
          fi
